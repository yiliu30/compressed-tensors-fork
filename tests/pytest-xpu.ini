[pytest]
addopts = -ra -m "not skip_xpu"
# Specify the directories that the xpu test should cover
testpaths =
    test_offload/cache/test_cpu.py
    test_offload/cache/test_device.py
# Define the custom marker for skipping tests on xpu with @pytest.mark.skip_xpu
markers =
    skip_xpu: mark test to be skipped on xpu