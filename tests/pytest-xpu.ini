[pytest]
addopts = -ra -m "not skip_xpu"
# Test files migrated to torch.accelerator for XPU compatibility.
# Run on real XPU:        cd tests && pytest -c pytest-xpu.ini
# Run on CUDA (emulated): cd tests && pytest -c pytest-xpu.ini --emulate-xpu
testpaths =
    test_offload/cache/test_cpu.py
    test_offload/test_xpu_routing.py
# Custom markers
markers =
    skip_xpu: mark test to be skipped on xpu
    unit: mark test as a unit test
