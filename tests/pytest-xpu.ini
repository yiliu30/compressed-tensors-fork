[pytest]
addopts = -ra -m "not skip_xpu"
testpaths =
    test_offload/cache/test_cpu.py
    test_offload/cache/test_device.py
    test_offload/cache/test_disk.py
    test_offload/cache/test_dist_cpu.py
    test_offload/cache/test_dist_device.py
    test_offload/cache/test_dist_disk.py
    test_offload/test_dispatch.py
    test_offload/test_interface.py
    test_offload/test_load.py
    test_offload/test_module.py
markers =
    skip_xpu: mark test to be skipped on xpu
    unit: unit test marker
